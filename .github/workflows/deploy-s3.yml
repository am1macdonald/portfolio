name: Deploy to S3

on:
    push:
        branches: [main]
    workflow_dispatch:

jobs:
    deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        env:
            # Aligns with my_infra/providers.tf (S3 origin for techcraftedbyadam.com).
            AWS_REGION: ${{ vars.AWS_REGION || 'ca-central-1' }}
        steps:
            - uses: actions/checkout@v4

            - name: Configure AWS credentials (OIDC)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ vars.AWS_ROLE_ARN }}
                  role-session-name: portfolio-s3-deploy-${{ github.run_id }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Sync site to S3
              run: |
                  BUCKET="tech-crafted-by-adam-bucket-585279896095"
                  echo "Deploying to s3://${BUCKET}"
                  aws s3 sync . "s3://${BUCKET}" --delete \
                    --exclude ".git/*" \
                    --exclude ".github/*" \
                    --exclude "node_modules/*" \
                    --exclude ".cursor/*" \
                    --exclude ".DS_Store" \
                    --exclude "package.json" \
                    --exclude "package-lock.json" \
                    --exclude "eslint.config.js" \
                    --exclude ".prettierrc" \
                    --exclude ".prettierignore"
